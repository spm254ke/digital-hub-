<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KES Gateway Test | Kennedy Digital Hub</title>
    <script src="https://unpkg.com/intasend-inlinejs-sdk@latest/build/intasend-inline.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #eef2f7; margin: 0; }
        .test-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 400px; border-top: 5px solid #10ac84; }
        h2 { color: #2d3436; }
        .btn-kes { background: #10ac84; color: white; border: none; padding: 18px 30px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-kes:hover { background: #089972; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="test-card">
        <h2>Local Currency Test</h2>
        <p>Testing M-Pesa and local card connection.</p>
        
        <button class="intaSendPayButton btn-kes" data-amount="100" data-currency="KES">
            Pay KES 100.00
        </button>

        <p style="font-size: 0.85rem; color: #636e72; margin-top: 20px;">
            Verify that <strong>M-Pesa</strong> appears as the primary option.
        </p>
    </div>

    <script>
        new window.IntaSend({
            publicAPIKey: "ISPubKey_live_dc5967eb-6e6a-497c-a10f-35a76358efea",
            live: true
        }).on("COMPLETE", (results) => {
            window.location.href = "https://spm254ke.github.io/digital-hub-/success.html";
        });
    </script>
</body>
</html>
