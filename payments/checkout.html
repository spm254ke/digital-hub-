<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
  <script src="https://unpkg.com/intasend-inlinejs-sdk@latest/build/intasend-inline.js"></script>
</head>
<body>
  <h1>Checkout Page</h1>
  <p>Click below to complete your payment securely with IntaSend.</p>

  <!-- IntaSend Payment Button -->
  <button class="intaSendPayButton" data-amount="20" data-currency="USD">
    Pay Now
  </button>

  <script>
    new window.IntaSend({
      publicAPIKey: "ISPubKey_live_dc5967eb-6e6a-497c-a10f-35a76358efea",
      live: true
    }).on("COMPLETE", function(response){
      console.log("Payment complete:", response);
      window.location.href = "https://spm254ke.github.io/digital-hub-/payments/receipt.html";
    });
  </script>
</body>
</html>
