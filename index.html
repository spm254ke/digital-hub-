<!-- Load IntaSend Checkout -->
<script src="https://cdn.intasend.com/checkout/intasend-inline.js"></script>
<button id="payButton">Pay with IntaSend</button>

<script>
  const checkout = new window.IntaSendCheckout({
    publicAPIKey: "ISPubKey_live_xxxxxxxx", // your actual public key
    currency: "KES",
    amount: 100,
    redirectURL: "https://spm254ke.github.io/digital-hub-/success.html"
  });

  document.getElementById("payButton").addEventListener("click", () => {
    checkout.open();
  });
</script>
