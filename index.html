<!DOCTYPE html>
<html>
<head>
  <title>Test IntaSend Popup</title>
  <script src="https://checkout.intasend.com/intasend-inline.js"></script>
</head>
<body>
  <h1>Test Payment</h1>
  <button id="payButton">Pay with IntaSend</button>

  <script>
    const checkout = new window.IntaSendCheckout({
      publicAPIKey: "ISPubKey_live_dc5967eb-6e6a-497c-a10f-35a76358efea", // replace with your actual public key
      currency: "KES",
      amount: 100,
      redirectURL: "https://spm254ke.github.io/digital-hub-/success.html"
    });

    document.getElementById("payButton").addEventListener("click", () => {
      checkout.open();
    });
  </script>
</body>
</html>
